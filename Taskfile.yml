version: '3'

vars:
  BIN_DIR: '{{.ROOT_DIR}}/bin'
  LOGIC: basic
  ENGINE_ARGS: --simulations 50 --parallel 5 --seed 750000000000000000
  GAME_ARGS: --max-turns 50 --league-level 3
  P0: '{{.LOGIC}}'
  P1: opponent

env:
  GOCACHE: '{{.ROOT_DIR}}/tmp/go-build'
  UV_CACHE_DIR: '{{.ROOT_DIR}}/tmp/uv-cache'

tasks:
  test:
    desc: Run tests for the selected agent logic
    cmds:
      - go test ./agent/{{.LOGIC}}/src

  test-match:
    desc: Run tests for the local match runner
    cmds:
      - go test ./internal/match

  bundle-agent:
    desc: Generate the arena bundle for the selected agent logic
    silent: true
    cmds:
      - cgmerge --dir agent/{{.LOGIC}}/src --output agent/{{.LOGIC}}/bundle/bundle.go >/dev/null

  build-agent:
    desc: Build an agent binary into ./bin/<logic>
    silent: true
    deps:
      - bundle-agent
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/{{.LOGIC}} ./agent/{{.LOGIC}}/bundle

  build-opponent:
    desc: Build the baseline opponent into ./bin/opponent
    silent: true
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/opponent ./agent/opponent

  build-arena:
    desc: Build the match runner binary into ./bin/arena
    silent: true
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build -o {{.BIN_DIR}}/arena ./cmd/match

  match:
    desc: Build and run the selected agent against the default opponent
    silent: true
    deps:
      - build-agent
    cmds:
      - '{{.BIN_DIR}}/arena --p0-bin {{.BIN_DIR}}/{{.LOGIC}} --p1-bin {{.BIN_DIR}}/opponent {{.ENGINE_ARGS}} {{.GAME_ARGS}}'

  match-bin:
    desc: Run two pre-built binaries against each other
    silent: true
    deps:
      - build-arena
    cmds:
      - '{{.BIN_DIR}}/arena --p0-bin {{.BIN_DIR}}/{{.P0}} --p1-bin {{.BIN_DIR}}/{{.P1}} {{.ENGINE_ARGS}} {{.GAME_ARGS}}'

  replay:
    desc: Regenerate debug JSON in ./debug/public
    cmds:
      - go test -tags debug ./agent/{{.LOGIC}}/src -run "^TestPrint" -v

  debug:
    desc: Launch the debug frontend after regenerating replay data
    deps:
      - replay
    dir: debug
    cmds:
      - pnpm dev

  benchmark-teacher:
    desc: Record the selected teacher for nn training
    cmds:
      - uv run --project ./agent/nn/train python ./agent/nn/train/teacher_info.py

  export-traces:
    desc: Export raw gzip JSONL traces from opponent self-play
    deps:
      - build-opponent
      - build-arena
    cmds:
      - mkdir -p ./agent/nn/train/traces
      - '{{.BIN_DIR}}/arena --p0-bin {{.BIN_DIR}}/opponent --p1-bin {{.BIN_DIR}}/opponent --trace-out ./agent/nn/train/traces/opponent.jsonl.gz {{.ENGINE_ARGS}} {{.GAME_ARGS}}'

  export-traces-large:
    desc: Export 5000 mixed-seed opponent self-play traces for nn training
    deps:
      - build-opponent
      - build-arena
    cmds:
      - mkdir -p ./agent/nn/train/traces
      - '{{.BIN_DIR}}/arena --p0-bin {{.BIN_DIR}}/opponent --p1-bin {{.BIN_DIR}}/opponent --trace-out ./agent/nn/train/traces/opponent.jsonl.gz --simulations 5000 --parallel 10 --seed 5503391867020331000 {{.GAME_ARGS}}'

  train-nn:
    desc: Train the tiny distilled NN and emit Go weights
    cmds:
      - uv run --project ./agent/nn/train python ./agent/nn/train/train.py

  evaluate-nn:
    desc: Evaluate the nn bot against the opponent teacher
    deps:
      - task: build-agent
        vars: {LOGIC: nn}
      - build-opponent
      - build-arena
    cmds:
      - uv run --project ./agent/nn/train python ./agent/nn/train/evaluate.py

  clean:
    desc: Remove built binaries
    cmds:
      - rm -rf {{.BIN_DIR}}
